name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (cross-compile sanity)
        run: |
          go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

      - name: Test (race + coverage)
        run: go test -race -count=1 -covermode=atomic -coverpkg=./... -coverprofile=coverage.txt ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
